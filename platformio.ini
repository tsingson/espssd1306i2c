[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = espidf
monitor_speed = 115200

board_upload.flash_size = 2MB
# 增加这一行，让依赖查找器强制寻找头文件
lib_ldf_mode = deep

;lib_deps =
;    nopnop2002/esp-idf-ssd1306


# 添加以下配置，编译时禁用调试日志
build_flags =
    -D CONFIG_BOOTLOADER_LOG_LEVEL_NONE
    -D CONFIG_LOG_DEFAULT_LEVEL_NONE
